<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Online</title>
    <link rel="stylesheet" href="style.css">

    <!-- Socket.IO via CDN -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <!-- O script.js deve vir depois do Socket.io -->
    <script defer src="script.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="app-container">

    <!-- TELA INICIAL / LISTA DE CONVERSAS -->
    <div id="home-screen" class="screen">
        <div class="home-header">
            <div class="home-title">Chat Online</div>

            <div class="menu-icon" onclick="toggleMenu()">
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>

            <!-- Menu Dropdown -->
            <div id="menu-dropdown" class="menu-dropdown">
                <ul>
                    <li onclick="logout()">
                        <i class="fa-solid fa-right-from-bracket"></i> Sair
                    </li>
                    <li onclick="clearChat()">
                        <i class="fa-solid fa-trash"></i> Apagar Conversas
                    </li>
                </ul>
            </div>
        </div>

        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="search-input" placeholder="Buscar conversa">
        </div>

        <div id="chat-list" class="chat-list">
            <!-- Lista de conversas será criada pelo script.js -->
        </div>

        <!-- CORREÇÃO: Adicionado onclick para abrir a tela de contatos -->
        <button id="new-chat-btn" class="new-chat-btn" title="Nova conversa" onclick="openContactsScreen()">
            <i class="fa-solid fa-pen"></i>
        </button>
    </div>

    <!-- TELA DE CONTATOS -->
    <div id="contacts-screen" class="screen hidden">
        <div class="contacts-header">
            <button class="back-btn" onclick="showHomeScreen()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="contacts-title">Contatos</div>
        </div>

        <div id="contacts-list" class="contacts-list">
            <!-- Contatos serão renderizados pelo script.js -->
        </div>
    </div>

    <!-- TELA DE CHAT -->
    <div id="chat-screen" class="screen hidden">
        <div class="chat-header">
            <button class="back-btn" onclick="showHomeScreen()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>

            <div class="chat-user-info">
                <div class="chat-avatar" id="chat-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="chat-user-text">
                    <div id="chat-title">Usuário</div>
                    <div id="chat-status">online</div>
                </div>
            </div>

            <div class="chat-top-actions">
                <i class="fa-solid fa-phone"></i>
                <i class="fa-solid fa-video"></i>
            </div>
        </div>

        <!-- Caixa de mensagens -->
        <div id="chat-box"></div>

        <!-- Indicador de digitando -->
        <div id="typing-indicator"></div>

        <!-- Entrada de mensagem -->
        <div class="input-container">
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="sendImage(event)" />

            <button id="attach-btn" onclick="document.getElementById('imageInput').click()" title="Anexar imagem">
                <i class="fa-solid fa-paperclip"></i>
            </button>

            <input type="text" id="message" placeholder="Mensagem" oninput="notifyTyping()" onblur="stopTyping()" />

            <button id="send-btn" onclick="sendMessage()" title="Enviar mensagem">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

</div>
</body>
</html>
